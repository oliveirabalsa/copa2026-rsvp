<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brasileirão na Copa — 13/06</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --amarelo: #FFCC00;
      --verde: #009c3B;
      --azul: #002776;
      --branco: #FFFFFF;
      --preto: #111111;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto Condensed', sans-serif;
      background: var(--preto);
      color: var(--branco);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .badge {
      display: inline-block;
      background: var(--amarelo);
      color: var(--preto);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.3em;
      padding: 6px 20px;
      border-radius: 4px;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      color: var(--amarelo);
      line-height: 1;
      text-shadow: 4px 4px 0 var(--azul);
      letter-spacing: 0.05em;
    }
    .subtitle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--verde);
      letter-spacing: 0.2em;
      margin-top: 8px;
    }
    .date-badge {
      background: var(--azul);
      color: var(--branco);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      padding: 8px 24px;
      border-radius: 4px;
      margin-top: 12px;
      display: inline-block;
    }
    .hosts {
      margin-top: 20px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
    }
    .hosts span {
      color: var(--amarelo);
      font-weight: 700;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      max-width: 700px;
    }
    .guest {
      background: rgba(255,255,255,0.05);
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      min-width: 110px;
      transition: all 0.2s;
      user-select: none;
    }
    .guest:hover {
      border-color: var(--amarelo);
      transform: scale(1.05);
    }
    .guest.confirmed {
      border-color: var(--verde);
      background: rgba(0,156,59,0.12);
    }
    .guest.confirmed .check {
      background: var(--verde);
      color: var(--branco);
    }
    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--branco);
      border: 3px solid rgba(255,255,255,0.2);
    }
    .guest.confirmed .avatar {
      border-color: var(--verde);
    }
    .name {
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.05em;
      color: var(--branco);
    }
    .check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .footer {
      margin-top: 48px;
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
    }
    .footer span { color: var(--amarelo); }
  </style>
</head>
<body>

  <div class="header">
    <div class="badge">🇺🇸🇲🇽🇨🇦 COPA 2026</div>
    <h1>BRASIL</h1>
    <div class="subtitle">🇧🇷 HEXA?</div>
    <div class="date-badge">SÁB · 13/06 · 14:00</div>
    <div class="hosts">anfitriões: <span>Leo & BK</span></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer">
    clique no nome para confirmar · salvo no seu navegador<br/>
    <span>Leo & BK © 2026</span>
  </div>

  <script>
    const GUESTS = [
      { id: 'leo',       name: 'Leo',        first: 'L', color: '#00BCD4' },
      { id: 'bk',        name: 'BK',         first: 'B', color: '#FFCC00' },
      { id: 'daniel',    name: 'Daniel',     first: 'D', color: '#009c3B' },
      { id: 'enailreg',  name: 'Enailreg',   first: 'E', color: '#002776' },
      { id: 'felipe',    name: 'Felipe',     first: 'F', color: '#FF0000' },
      { id: 'gabru',     name: 'Gabru',      first: 'G', color: '#C9A84C' },
      { id: 'glorinha',  name: 'Glorinha',   first: 'Gl', color: '#E91E63' },
      { id: 'gustavo',   name: 'Gustavo P.', first: 'GP', color: '#3F51B5' },
      { id: 'ilana',     name: 'Ilana',      first: 'I', color: '#9C27B0' },
      { id: 'natan',     name: 'Natan',      first: 'N', color: '#FF9800' },
      { id: 'rosangela', name: 'Rosangela',  first: 'R', color: '#795548' },
    ];

    const STORAGE_KEY = 'copa13_confirmed';

    function getConfirmed() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
      catch { return []; }
    }
    function setConfirmed(ids) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ids));
    }
    function toggle(id) {
      const confirmed = getConfirmed();
      const idx = confirmed.indexOf(id);
      if (idx >= 0) confirmed.splice(idx, 1);
      else confirmed.push(id);
      setConfirmed(confirmed);
      render();
    }
    function render() {
      const grid = document.getElementById('grid');
      const confirmed = getConfirmed();
      grid.innerHTML = '';
      GUESTS.forEach(g => {
        const isC = confirmed.includes(g.id);
        const el = document.createElement('div');
        el.className = 'guest' + (isC ? ' confirmed' : '');
        el.onclick = () => toggle(g.id);
        el.innerHTML = `
          <div class="avatar" style="background:${g.color}">${g.first}</div>
          <div class="name">${g.name}</div>
          <div class="check">${isC ? '✓' : ''}</div>
        `;
        grid.appendChild(el);
      });
    }
    render();
  </script>
</body>
</html>
