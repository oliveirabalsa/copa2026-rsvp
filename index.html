<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brasileirão na Copa — 13/06</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --amarelo: #FFCC00;
      --verde: #009c3B;
      --azul: #002776;
      --branco: #FFFFFF;
      --preto: #111111;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Roboto Condensed', sans-serif;
      background: var(--preto);
      color: var(--branco);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .header { text-align: center; margin-bottom: 48px; }
    .badge {
      display: inline-block;
      background: var(--amarelo);
      color: var(--preto);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.3em;
      padding: 6px 20px;
      border-radius: 4px;
      margin-bottom: 16px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 6rem);
      color: var(--amarelo);
      line-height: 1;
      text-shadow: 4px 4px 0 var(--azul);
      letter-spacing: 0.05em;
    }
    .subtitle {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--verde);
      letter-spacing: 0.2em;
      margin-top: 8px;
    }
    .date-badge {
      background: var(--azul);
      color: var(--branco);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      padding: 8px 24px;
      border-radius: 4px;
      margin-top: 12px;
      display: inline-block;
    }
    .hosts {
      margin-top: 20px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
    }
    .hosts span { color: var(--amarelo); font-weight: 700; }
    .status-bar {
      margin-top: 16px;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
      height: 20px;
    }
    .status-bar.online { color: var(--verde); }
    .status-bar.offline { color: #FF5722; }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      max-width: 700px;
    }
    .guest {
      background: rgba(255,255,255,0.05);
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      min-width: 110px;
      transition: all 0.2s;
      user-select: none;
    }
    .guest:hover { border-color: var(--amarelo); transform: scale(1.05); }
    .guest.confirmed {
      border-color: var(--verde);
      background: rgba(0,156,59,0.12);
    }
    .guest.confirmed .check {
      background: var(--verde);
      color: var(--branco);
    }
    .avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--branco);
      border: 3px solid rgba(255,255,255,0.2);
    }
    .guest.confirmed .avatar { border-color: var(--verde); }
    .name { font-weight: 700; font-size: 0.95rem; letter-spacing: 0.05em; color: var(--branco); }
    .check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .footer {
      margin-top: 48px;
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
    }
    .footer span { color: var(--amarelo); }
  </style>
</head>
<body>

  <div class="header">
    <div class="badge">🇺🇸🇲🇽🇨🇦 COPA 2026</div>
    <h1>BRASIL</h1>
    <div class="subtitle">🇧🇷 HEXA?</div>
    <div class="date-badge">SÁB · 13/06 · 14:00</div>
    <div class="hosts">anfitriões: <span>Leo & BK</span></div>
    <div class="status-bar" id="status">conectando...</div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer">
    confirmação em tempo real · <span>Leo & BK © 2026</span>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script>
    // ══════════════════════════════════════════════════════
    // 👉 COLE AQUI SUA CONFIG DO FIREBASE
    // Substitua o texto entre aspas pela sua configuração
    // ══════════════════════════════════════════════════════
    const FIREBASE_CONFIG = {
      apiKey:            "AIzaSyCfyk7GlqjdMaOpDy9TTr_3yLEt3L5wOnY",
      authDomain:        "copa-2026-f8c83.firebaseapp.com",
      databaseURL:       "https://copa-2026-f8c83-default-rtdb.firebaseio.com",
      projectId:         "copa-2026-f8c83",
      storageBucket:     "copa-2026-f8c83.firebasestorage.app",
      messagingSenderId: "1096577916136",
      appId:             "1:1096577916136:web:fb4d148b6fe3be3392bd5d"
    };
    // ══════════════════════════════════════════════════════

    const GUESTS = [
      { id: 'leo',       name: 'Leo',        first: 'L', color: '#00BCD4' },
      { id: 'bk',        name: 'BK',         first: 'B', color: '#FFCC00' },
      { id: 'daniel',    name: 'Daniel',     first: 'D', color: '#009c3B' },
      { id: 'enailreg',  name: 'Enailreg',   first: 'E', color: '#002776' },
      { id: 'felipe',    name: 'Felipe',     first: 'F', color: '#FF0000' },
      { id: 'gabru',     name: 'Gabru',      first: 'G', color: '#C9A84C' },
      { id: 'glorinha',  name: 'Glorinha',   first: 'Gl', color: '#E91E63' },
      { id: 'gustavo',   name: 'Gustavo P.', first: 'GP', color: '#3F51B5' },
      { id: 'ilana',     name: 'Ilana',      first: 'I', color: '#9C27B0' },
      { id: 'natan',     name: 'Natan',      first: 'N', color: '#FF9800' },
      { id: 'rosangela', name: 'Rosangela',  first: 'R', color: '#795548' },
    ];

    // ── FIREBASE INIT ──────────────────────────────────────
    let db;
    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.database();
      document.getElementById('status').textContent = '● ao vivo';
      document.getElementById('status').className = 'status-bar online';
    } catch (e) {
      document.getElementById('status').textContent = 'modo local (Firebase não configurado)';
      document.getElementById('status').className = 'status-bar offline';
    }

    // ── RENDER ─────────────────────────────────────────────
    function render(confirmed) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      GUESTS.forEach(g => {
        const isC = confirmed.includes(g.id);
        const el = document.createElement('div');
        el.className = 'guest' + (isC ? ' confirmed' : '');
        el.onclick = () => toggle(g.id, confirmed);
        el.innerHTML = `
          <div class="avatar" style="background:${g.color}">${g.first}</div>
          <div class="name">${g.name}</div>
          <div class="check">${isC ? '✓' : ''}</div>
        `;
        grid.appendChild(el);
      });
    }

    // ── TOGGLE ─────────────────────────────────────────────
    function toggle(id, confirmed) {
      if (!db) return;
      const idx = confirmed.indexOf(id);
      const next = [...confirmed];
      if (idx >= 0) next.splice(idx, 1);
      else next.push(id);
      db.ref('confirmations/match_13_06').set(next);
    }

    // ── LISTEN ──────────────────────────────────────────────
    if (db) {
      db.ref('confirmations/match_13_06').on('value', snap => {
        const data = snap.val() || [];
        render(data);
      });
    } else {
      // fallback localStorage
      const local = JSON.parse(localStorage.getItem('copa13_confirmed') || '[]');
      render(local);
    }
  </script>
</body>
</html>
